name: Build Android APK
on:
  push:
    branches: [ main, master ] # Se déclenche dès que vous enregistrez du code sur votre branche principale

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: |
          npm install
          npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: Build Web App
        run: npm run build
        env:
          VITE_FIREBASE_KEY: ${{ secrets.VITE_FIREBASE_KEY }}
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
          VITE_GEMINI_KEY: ${{ secrets.VITE_GEMINI_KEY }}
          VITE_VAPID_KEY: ${{ secrets.VITE_VAPID_KEY }}

      - name: Capacitor Sync
        run: |
          npx cap init Beezy com.gabrielfrezouls.beezy --web-dir=dist
          npx cap add android
          npx cap sync android

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21' # Corrigé ici : Passage en Java 21 pour éviter l'échec de compilation

      - name: Build APK
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
